<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- text encoding -->
    <meta charset="utf-8" />
    <!-- mobile scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- page summary -->
    <meta name="description" content="Learning html" />
    <!-- seo keywords -->
    <meta name="keywords" content="HTML,CSS,JS," />
    <!-- page creator -->
    <meta name="author" content="Aman Karn" />
    <!-- auto reload -->
    <meta http-equiv="refresh" content="10" />
    <!-- redirect timer -->
    <meta http-equiv="refresh" content="10; url=https://www.wikipedia.org" />

    <title>Winter BootCamp</title>
  </head>
  <body>
    <h1>Aman</h1>
    <h2>Aman</h2>
    <h3>Aman</h3>
    <h4>Aman</h4>
    <h5>Aman</h5>
    <h6>Aman</h6>

    <p>
      This is a simple paragraph written by<br />
      <span>Aman Karn</span>.
    </p>

    <!-- Inline level tag example -->
    <span>This is an inline tag example</span>

    <!-- Semantic tag example -->
    <header>This is a semantic tag example</header>

    <!-- Non-semantic tag example -->
    <div>This is a non-semantic tag example</div>

    <!-- Unordered List -->
    <h2>Unordered List</h2>
    <ul>
      <li>Apple</li>
      <li>Banana</li>
      <li>Mango</li>
    </ul>

    <!-- Ordered List -->
    <h2>Ordered List</h2>
    <ol>
      <li>Step One</li>
      <li>Step Two</li>
      <li>Step Three</li>
    </ol>
    <!-- Image -->
    <img
      src="https://t3.ftcdn.net/jpg/05/26/64/52/360_F_526645293_aAjy7vuhoJGd55TrG3yyAmGO6WngMGr3.jpg"
      alt="Image"
    />
    <!-- Basic iframe -->
    <iframe src="https://www.wikipedia.org" width="600" height="400"></iframe>
    <!-- Basic Form -->
    <form>
      <label>Name:</label>
      <input type="text" name="username" />
      <br /><br />
      <label>Email:</label>
      <input type="email" name="email" />
      <br /><br />
      <label>Password:</label>
      <input type="password" name="password" />
      <br /><br />
      <label>Age:</label>
      <input type="number" name="age" />
      <br /><br />
      <label>Date:</label>
      <input type="date" name="date" />
      <br /><br />
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
