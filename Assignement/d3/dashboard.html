<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Layout</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="dashboard">
      <header class="header">
        <h1>Dashboard</h1>
      </header>

      <div class="layout">
        <aside class="sidebar">
          <h2>Menu</h2>
          <ul>
            <li>Dashboard</li>
            <li>Analiystic</li>
            <li>Report</li>
            <li>Setting</li>
          </ul>
        </aside>

        <main class="main">
          <section class="stats">
            <div class="stat-card">
              <h3>User</h3>
              <p>1,250</p>
            </div>
            <div class="stat-card">
              <h3>Sales</h3>
              <p>₹45,000</p>
            </div>
            <div class="stat-card">
              <h3>Visitors</h3>
              <p>8,900</p>
            </div>
            <div class="stat-card">
              <h3>Bounce</h3>
              <p>32%</p>
            </div>
          </section>

          <section class="cards-grid">
            <div class="card">Card 1</div>
            <div class="card">Card 2</div>
            <div class="card">Card 3</div>
            <div class="card">Card 4</div>
            <div class="card">Card 5</div>
            <div class="card">Card 6</div>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
